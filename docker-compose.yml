services:
  backend:
    build:
      context: ./backend
      dockerfile: DockerFile
    container_name: clearsheet-backend
    environment:
      CORS_ORIGINS: http://localhost:3000
      OCR_LANGS: fra+eng
      MAX_UPLOAD_MB: 10
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    container_name: clearsheet-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
